services:
  searxng:
    image: searxng/searxng:latest
    restart: unless-stopped
    ports:
      - '8081:8080'
    environment:
      - BASE_URL=http://localhost:8080/
    entrypoint: ['/bin/sh', '-c']
    command:
      - |
        cat > /etc/searxng/settings.yml <<'EOF'
        use_default_settings: true

        server:
          secret_key: "replace-this-for-production"

        search:
          formats:
            - html
            - json
        EOF
        exec /usr/local/searxng/entrypoint.sh
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:8080/ >/dev/null 2>&1 || exit 1']
      interval: 20s
      timeout: 5s
      retries: 5

  searxng-mcp:
    image: ghcr.io/jae-jae/searxng-mul-mcp:latest
    restart: unless-stopped
    depends_on:
      searxng:
        condition: service_healthy
    environment:
      - SEARXNG_URL=http://searxng:8080
      - TRANSPORT=http
      - HOST=0.0.0.0
      - PORT=3000
      # Optional: Basic auth for protected SearXNG instances
      # - USERNAME=your_username
      # - PASSWORD=your_password
    ports:
      - '3100:3000'
