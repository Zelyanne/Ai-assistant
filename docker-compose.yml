services:
  agent:
    build:
      context: .
      dockerfile: Dockerfile
      target: agent
    environment:
      NODE_ENV: production
      PORT_PROJECT_GOOGLE_ASSITANT: 3001
      NODE_ENV_PROJECT_GOOGLE_ASSITANT: production
      DEFAULT_LLM_MODEL_PROJECT_GOOGLE_ASSITANT:
      SUPABASE_URL_PROJECT_GOOGLE_ASSITANT:
      SUPABASE_SERVICE_ROLE_KEY_PROJECT_GOOGLE_ASSITANT:
      MISTRAL_API_KEY_PROJECT_GOOGLE_ASSITANT:
      OPENAI_API_KEY_PROJECT_GOOGLE_ASSITANT:
      ANTHROPIC_API_KEY_PROJECT_GOOGLE_ASSITANT:
      SEARXNG_MCP_URL_PROJECT_GOOGLE_ASSITANT:
      SEARXNG_URL_PROJECT_GOOGLE_ASSITANT:
      SEARXNG_MCP_USERNAME_PROJECT_GOOGLE_ASSITANT:
      SEARXNG_MCP_PASSWORD_PROJECT_GOOGLE_ASSITANT:
      GOOGLE_OAUTH_CLIENT_ID_PROJECT_GOOGLE_ASSITANT:
      GOOGLE_OAUTH_CLIENT_SECRET_PROJECT_GOOGLE_ASSITANT:
      GOOGLE_OAUTH_REDIRECT_URI_PROJECT_GOOGLE_ASSITANT:
      ENCRYPTION_SECRET_PROJECT_GOOGLE_ASSITANT:
      TELEGRAM_BOT_TOKEN_PROJECT_GOOGLE_ASSITANT:
      TELEGRAM_BOT_USERNAME_PROJECT_GOOGLE_ASSITANT:
      TELEGRAM_WEBHOOK_SECRET_PROJECT_GOOGLE_ASSITANT:
      TELEGRAM_WEBHOOK_URL_PROJECT_GOOGLE_ASSITANT:
      WHATSAPP_PROVIDER_PROJECT_GOOGLE_ASSITANT:
      EVOLUTION_API_BASE_URL_PROJECT_GOOGLE_ASSITANT:
      EVOLUTION_API_KEY_PROJECT_GOOGLE_ASSITANT:
      EVOLUTION_INSTANCE_NAME_PROJECT_GOOGLE_ASSITANT:
      EVOLUTION_WEBHOOK_SECRET_PROJECT_GOOGLE_ASSITANT:
      WHATSAPP_API_KEY_PROJECT_GOOGLE_ASSITANT:
      WHATSAPP_PHONE_NUMBER_ID_PROJECT_GOOGLE_ASSITANT:
      WHATSAPP_WEBHOOK_SECRET_PROJECT_GOOGLE_ASSITANT:
      TWILIO_ACCOUNT_SID_PROJECT_GOOGLE_ASSITANT:
      TWILIO_AUTH_TOKEN_PROJECT_GOOGLE_ASSITANT:
      TWILIO_WHATSAPP_PHONE_NUMBER_PROJECT_GOOGLE_ASSITANT:
      ENABLE_LANGFUSE_TRACING_PROJECT_GOOGLE_ASSITANT:
      LANGFUSE_PUBLIC_KEY_PROJECT_GOOGLE_ASSITANT:
      LANGFUSE_SECRET_KEY_PROJECT_GOOGLE_ASSITANT:
      LANGFUSE_HOST_PROJECT_GOOGLE_ASSITANT:
      LANGSMITH_TRACING_PROJECT_GOOGLE_ASSITANT:
      LANGSMITH_ENDPOINT_PROJECT_GOOGLE_ASSITANT:
      LANGSMITH_API_KEY_PROJECT_GOOGLE_ASSITANT:
      LANGSMITH_PROJECT_PROJECT_GOOGLE_ASSITANT:
      CONFIDENCE_THRESHOLD_PROJECT_GOOGLE_ASSITANT:
      CRON_POLL_INTERVAL_MS_PROJECT_GOOGLE_ASSITANT:
      DEFAULT_TIMEZONE_PROJECT_GOOGLE_ASSITANT:
      MAX_SCHEDULE_FAILURES_PROJECT_GOOGLE_ASSITANT:
      EOD_TRIGGER_TIME_UTC_PROJECT_GOOGLE_ASSITANT:
      EOD_TRIGGER_TIME_BY_ORG_JSON_PROJECT_GOOGLE_ASSITANT:
      INGESTION_MAX_RESULTS_PROJECT_GOOGLE_ASSITANT:
      GMAIL_THREAD_DETAIL_CONCURRENCY_PROJECT_GOOGLE_ASSITANT:
      TRIAGE_BATCH_INPUT_TOKENS_PROJECT_GOOGLE_ASSITANT:
      TRIAGE_BATCH_CONCURRENCY_PROJECT_GOOGLE_ASSITANT:
      TRIAGE_BATCH_OUTPUT_TOKENS_PROJECT_GOOGLE_ASSITANT:
    expose:
      - "3001"
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: web
      args:
        VITE_SUPABASE_URL_PROJECT_GOOGLE_ASSITANT: ${VITE_SUPABASE_URL_PROJECT_GOOGLE_ASSITANT:-}
        VITE_SUPABASE_ANON_KEY_PROJECT_GOOGLE_ASSITANT: ${VITE_SUPABASE_ANON_KEY_PROJECT_GOOGLE_ASSITANT:-}
        VITE_AGENT_URL_PROJECT_GOOGLE_ASSITANT: ${VITE_AGENT_URL_PROJECT_GOOGLE_ASSITANT:-https://aizelyan.duckdns.org/agent}
    networks:
      default:
      caddy:
        aliases:
          - ai-assistant-web
    depends_on:
      - agent
    restart: unless-stopped

networks:
  caddy:
    external: true
    name: lin-app-_lin-network
