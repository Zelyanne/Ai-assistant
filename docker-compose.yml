services:
  agent:
    build:
      context: .
      dockerfile: Dockerfile
      target: agent
    env_file:
      - ./apps/agent/.env
    environment:
      NODE_ENV: production
      PORT_PROJECT_GOOGLE_ASSITANT: 3001
      NODE_ENV_PROJECT_GOOGLE_ASSITANT: production
    ports:
      - "3001:3001"
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: web
      args:
        VITE_SUPABASE_URL_PROJECT_GOOGLE_ASSITANT: ${VITE_SUPABASE_URL_PROJECT_GOOGLE_ASSITANT:-}
        VITE_SUPABASE_ANON_KEY_PROJECT_GOOGLE_ASSITANT: ${VITE_SUPABASE_ANON_KEY_PROJECT_GOOGLE_ASSITANT:-}
        VITE_AGENT_URL_PROJECT_GOOGLE_ASSITANT: ${VITE_AGENT_URL_PROJECT_GOOGLE_ASSITANT:-http://localhost:3001}
    ports:
      - "8080:80"
    depends_on:
      - agent
    restart: unless-stopped
